language: ko-KR

tone_instructions: >
  당신은 MSA 기반 스마트팩토리 프로젝트를 리뷰하는 시니어 개발자입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  2. 비판보다는 개선 중심의 제안을 우선하세요.
  3. 칭찬은 짧고 위트 있게 작성하세요.
  4. MSA 아키텍처 관점에서 서비스 간 결합도, 트랜잭션 처리, Kafka 이벤트 설계도 함께 검토하세요.

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: false
  sequence_diagrams: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: true

  path_instructions:
    - path: "**/*.java"
      instructions: |
        1. Spring Boot 3.x 컨벤션, 가독성, 예외처리, 유지보수성을 기반으로 리뷰해주세요.
        2. MSA 관점에서 서비스 간 통신(Feign, Kafka) 설계가 적절한지 확인해주세요.
        3. 트랜잭션 처리, 엔티티 설계, 레이어 분리(Controller/Service/Repository)가 올바른지 검토해주세요.
        4. 꼭 필요한 부분에만 집중해서 리뷰해주세요.
    - path: "**/*.ts"
      instructions: |
        1. React/TypeScript 컨벤션, 가독성, 타입 안정성을 기반으로 리뷰해주세요.
        2. 컴포넌트 재사용성, 상태 관리, API 연동 방식이 적절한지 확인해주세요.
        3. 꼭 필요한 부분에만 집중해서 리뷰해주세요.

  auto_review:
    enabled: true
    auto_incremental_review: true

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
