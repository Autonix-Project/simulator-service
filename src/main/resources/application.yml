server:
  port: 8084

spring:
  application:
    name: simulator-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: simulator-group
      auto-offset-reset: earliest
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/