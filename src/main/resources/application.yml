server:
  port: 8084  # 시뮬레이터 포트

spring:
  application:
    name: simulator-service
  kafka:
    bootstrap-servers: localhost:9092  # 카프카 주소
    consumer:
      group-id: simulator-group
      auto-offset-reset: earliest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Feign Client 설정
spring.cloud.openfeign.client.config.default:
  connectTimeout: 5000
  readTimeout: 5000